<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad-ai-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <rect width="400" height="300" fill="#F5F3FF"/>
  
  <!-- Central Node -->
  <circle cx="200" cy="150" r="80" fill="url(#grad-ai-glow)"/>
  <rect x="170" y="120" width="60" height="60" rx="12" fill="#1F2937"/>
  <rect x="180" y="130" width="40" height="40" rx="8" fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Links and Sub-nodes -->
  <line x1="200" y1="150" x2="300" y2="80" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="200" y1="150" x2="300" y2="220" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="200" y1="150" x2="100" y2="80" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="200" y1="150" x2="100" y2="220" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 2"/>
  
  <circle cx="300" cy="80" r="10" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="300" cy="220" r="10" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="100" cy="80" r="10" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="100" cy="220" r="10" fill="#8B5CF6" opacity="0.4"/>
  
  <!-- Data Particles -->
  <circle r="3" fill="#8B5CF6">
    <animateMotion path="M200 150L300 80" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle r="3" fill="#8B5CF6">
    <animateMotion path="M200 150L100 220" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
